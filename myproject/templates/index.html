{% extends "base.html" %}
{% block content %}
    <h1>メモアプリ</h1>
        {% if memo_list == [] %}
            <p>メモはありません</p>
        {% else %}
            <table border="1">
                <tr>
                    <th>タイトル</th>
                    <th>本文</th>
                </tr>
                {% for memo in memo_list %}
                    <tr>
                        <td>{{memo.title}}</td>
                        <td>{{memo.body}}</td>
                    </tr>
                {% endfor %}
            </table>
        {% endif %}

{% endblock %}
